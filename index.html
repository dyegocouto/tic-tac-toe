<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tic-tac-toe</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="header-title">Tic Tac Toe</h1>
        <p class="header-desc">Can you beat the CPU? 🤔</p>
      </header>
      <main class="main">
        <div class="window">
          <div class="title-bar">
            <span class="circle"></span>
            <span class="circle"></span>
            <span class="circle"></span>
          </div>
          <div class="window-body">
            <div class="board">
              <div class="cell" data-cell="0"></div>
              <div class="cell" data-cell="1"></div>
              <div class="cell" data-cell="2"></div>
              <div class="cell" data-cell="3"></div>
              <div class="cell" data-cell="4"></div>
              <div class="cell" data-cell="5"></div>
              <div class="cell" data-cell="6"></div>
              <div class="cell" data-cell="7"></div>
              <div class="cell" data-cell="8"></div>
            </div>
          </div>
        </div>
      </main>
      <footer class="footer">
        <p class="footer-desc">Created by dyegocouto</p>
        <a href="https://github.com/dyegocouto" target="_blank">
          <img
            class="footer-logo"
            src="src/assets/github-mark.svg"
            alt="GitHub logo"
          />
        </a>
      </footer>
      <dialog class="modal">
        <h2 class="modal-message">Game Over!</h2>
        <button class="modal-button">Play Again</button>
      </dialog>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
